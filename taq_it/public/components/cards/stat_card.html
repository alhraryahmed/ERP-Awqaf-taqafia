<div class="card card-stat">

    <div class="card-header">

        <span class="card-title">
            {{ title or "العنوان" }}
        </span>

        <div class="card-icon">

            {{ icon or "📊" }}

        </div>

    </div>

    <div class="card-body">

        <h2 class="card-stat-value">

            {{ value or "0" }}

        </h2>

        <p class="card-stat-label">

            {{ label or "" }}

        </p>

    </div>

</div>
